<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yasmeen Cards Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
        }
        header {
            background-color: #ff6f61;
            color: white;
            text-align: center;
            padding: 20px;
        }
        header h1 {
            margin: 0;
        }
        .owner {
            font-size: 18px;
            margin-top: 5px;
        }
        .container {
            padding: 20px;
        }
        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        footer {
            text-align: center;
            padding: 10px;
            background: #333;
            color: white;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body><header>
    <h1>Yasmeen Cards Store</h1>
    <div class="owner">Owned by Yasmeen</div>
</header><div class="container">
    <h2>Our Cards</h2><div class="card">
    <h3>Birthday Card</h3>
    <p>Beautiful birthday cards for your loved ones.</p>
</div>

<div class="card">
    <h3>Wedding Card</h3>
    <p>Elegant wedding invitation cards.</p>
</div>

<div class="card">
    <h3>Greeting Card</h3>
    <p>Special greeting cards for every occasion.</p>
</div>

</div><footer>
    <p>© 2026 Yasmeen Cards Store</p>
</footer></body>
</html>
